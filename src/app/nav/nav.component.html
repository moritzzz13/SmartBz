<mat-sidenav-container class="sidenav-container">
  <mat-sidenav
    #drawer
    class="sidenav"
    fixedInViewport
    [attr.role]="(isHandset$ | async) ? 'dialog' : 'navigation'"
    [mode]="(isHandset$ | async) ? 'over' : 'side'"
    [opened]="(isHandset$ | async) === false"
  >
    <!-- Brand Header -->
    <div class="brand-header">
      <div class="brand-logo">
        <span class="brand-icon">🏙️</span>
      </div>
      <div class="brand-text">
        <span class="brand-name">SmartBz</span>
        <span class="brand-tagline">Digitale Stadt</span>
      </div>
    </div>

    <div class="nav-divider"></div>

    <!-- Nav Links -->
    <nav class="nav-list">
      <a class="nav-item" routerLink="/home" routerLinkActive="active">
        <span class="nav-icon">🏠</span>
        <span class="nav-label">Home</span>
        <span class="nav-arrow">›</span>
      </a>
      <a class="nav-item" routerLink="/weather" routerLinkActive="active">
        <span class="nav-icon">🌤️</span>
        <span class="nav-label">Wetter</span>
        <span class="nav-arrow">›</span>
      </a>
      <a class="nav-item" routerLink="/traffic" routerLinkActive="active">
        <span class="nav-icon">🚦</span>
        <span class="nav-label">Verkehr</span>
        <span class="nav-arrow">›</span>
      </a>
      <a class="nav-item" routerLink="/mobility" routerLinkActive="active">
        <span class="nav-icon">🚲</span>
        <span class="nav-label">Mobilität</span>
        <span class="nav-arrow">›</span>
      </a>

      <div class="nav-divider"></div>

      <a class="nav-item external" href="https://www.suedtirolmobil.info/de/#/" target="_blank" rel="noopener noreferrer">
        <span class="nav-icon">🚌</span>
        <span class="nav-label">Öffis</span>
        <span class="nav-external">↗</span>
      </a>
    </nav>

    <!-- Footer -->
    <div class="sidenav-footer">
      <span class="footer-text">Powered by OpenDataHub</span>
    </div>
  </mat-sidenav>

  <mat-sidenav-content>
    <!-- Top Toolbar -->
    <header class="app-toolbar">
      @if (isHandset$ | async) {
        <button
          type="button"
          aria-label="Toggle sidenav"
          class="menu-toggle"
          (click)="drawer.toggle()"
        >
          <mat-icon>menu</mat-icon>
        </button>
      }
      <span class="toolbar-title">SmartBz</span>
      <span class="toolbar-subtitle">Bozen · Bolzano</span>
    </header>

    <ng-content></ng-content>
  </mat-sidenav-content>
</mat-sidenav-container>
