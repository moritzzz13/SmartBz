<div class="home">
    <h1>Willkommen bei SmartBz</h1>
    <h2>Die Digitale Übersicht deiner Stadt!</h2>

    <div class="">
        <mat-card appearance="outlined">
            <mat-card-header>
                <mat-card-title>{{temperature}}° - {{ mood }}</mat-card-title>
                <mat-card-subtitle>Das aktuelle Wetter in Bozen, gemessen an verschiedenten Messstationen, verteilt in ganz Südtirol</mat-card-subtitle>
            </mat-card-header>
            <mat-card-actions align="end">
                <button matButton (click)="routeToWeather()">Schau es dir an!</button>
            </mat-card-actions>
        </mat-card>

        <mat-card appearance="outlined">
            <mat-card-header>
                <mat-card-title>Verkehr</mat-card-title>
                <mat-card-subtitle>Der aktelle Verehr in Bozen, immer aktuell informiert über de neuesten Änderungen</mat-card-subtitle>
            </mat-card-header>
            <mat-card-actions align="end">
                <button matButton (click)="routeToTraffic()">Schau es dir an!</button>
            </mat-card-actions>
        </mat-card>
    </div>
</div>
